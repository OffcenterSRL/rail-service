<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HMU Service — Gestione Lavorazioni</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root {
–bg: #0a0e14;
–surface: #111720;
–surface2: #1a2333;
–border: #1e2d42;
–accent: #e8441a;
–accent2: #f5a623;
–blue: #2d7dd2;
–green: #2ecc71;
–text: #e8edf2;
–text2: #7a8fa6;
–red: #e84040;
–mono: ‘DM Mono’, monospace;
–sans: ‘Syne’, sans-serif;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–sans);
min-height: 100vh;
}

/* ── HEADER ── */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 0 24px;
display: flex;
align-items: center;
justify-content: space-between;
height: 60px;
position: sticky; top: 0; z-index: 100;
}
.logo {
display: flex; align-items: center; gap: 10px;
font-size: 15px; font-weight: 800; letter-spacing: .5px;
}
.logo-icon {
width: 30px; height: 30px;
background: var(–accent);
clip-path: polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);
display: flex; align-items: center; justify-content: center;
font-size: 14px;
}
.logo span { color: var(–accent); }
.header-right { display: flex; gap: 8px; align-items: center; }
.mode-badge {
background: var(–surface2);
border: 1px solid var(–border);
padding: 4px 12px; border-radius: 20px;
font-size: 12px; font-family: var(–mono); cursor: pointer;
transition: all .2s;
}
.mode-badge:hover { border-color: var(–accent); color: var(–accent); }
.mode-badge.active { background: var(–accent); border-color: var(–accent); color: #fff; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── CAPOTURNO VIEW ── */
.ct-layout {
display: grid;
grid-template-columns: 340px 1fr;
gap: 0;
height: calc(100vh - 60px);
}

/* Sidebar */
.sidebar {
background: var(–surface);
border-right: 1px solid var(–border);
display: flex; flex-direction: column;
overflow: hidden;
}
.sidebar-header {
padding: 20px;
border-bottom: 1px solid var(–border);
}
.sidebar-header h2 {
font-size: 13px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: var(–text2); margin-bottom: 14px;
}
.input-row { display: flex; gap: 8px; margin-bottom: 8px; }
input[type=text], input[type=number], textarea, select {
background: var(–bg);
border: 1px solid var(–border);
color: var(–text);
font-family: var(–mono);
font-size: 13px;
padding: 9px 12px;
border-radius: 6px;
outline: none;
width: 100%;
transition: border-color .2s;
}
input:focus, textarea:focus, select:focus { border-color: var(–accent); }
textarea { resize: vertical; min-height: 60px; }
select option { background: var(–surface); }

.btn {
padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer;
font-family: var(–sans); font-size: 13px; font-weight: 700;
transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(–accent); color: #fff; }
.btn-primary:hover { background: #d03a14; }
.btn-secondary { background: var(–surface2); color: var(–text); border: 1px solid var(–border); }
.btn-secondary:hover { border-color: var(–text2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-blue { background: var(–blue); color: #fff; }
.btn-blue:hover { background: #2369b8; }
.btn-green { background: var(–green); color: #000; }

/* Train list */
.train-list { flex: 1; overflow-y: auto; padding: 12px; }
.train-card {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 14px;
margin-bottom: 8px;
cursor: pointer;
transition: all .15s;
position: relative;
}
.train-card:hover, .train-card.selected { border-color: var(–accent); }
.train-card.selected { background: rgba(232,68,26,.08); }
.train-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.train-id { font-size: 16px; font-weight: 800; font-family: var(–mono); }
.train-progress { font-size: 12px; color: var(–text2); font-family: var(–mono); }
.progress-bar { height: 3px; background: var(–border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(–accent); transition: width .3s; border-radius: 2px; }
.progress-fill.complete { background: var(–green); }

/* Main panel */
.main-panel { overflow-y: auto; padding: 24px; }
.panel-empty {
height: 100%; display: flex; flex-direction: column;
align-items: center; justify-content: center;
color: var(–text2); gap: 12px;
}
.panel-empty .big-icon { font-size: 48px; opacity: .3; }
.panel-empty p { font-family: var(–mono); font-size: 13px; }

.panel-header {
display: flex; justify-content: space-between; align-items: flex-start;
margin-bottom: 20px; padding-bottom: 16px;
border-bottom: 1px solid var(–border);
}
.panel-title { font-size: 24px; font-weight: 800; }
.panel-meta { font-size: 13px; color: var(–text2); font-family: var(–mono); margin-top: 4px; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px; padding: 14px;
}
.stat-label { font-size: 11px; color: var(–text2); letter-spacing: 1.5px; text-transform: uppercase; font-family: var(–mono); margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 800; }
.stat-value.green { color: var(–green); }
.stat-value.orange { color: var(–accent2); }
.stat-value.red { color: var(–red); }
.stat-value.blue { color: var(–blue); }

/* Add lavorazione form */
.add-lav-form {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px; padding: 16px; margin-bottom: 20px;
}
.add-lav-form h3 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(–text2); margin-bottom: 12px; font-family: var(–mono); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }

/* Lavorazioni table */
.lav-section h3 {
font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
color: var(–text2); margin-bottom: 12px; font-family: var(–mono);
}
.lav-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px; padding: 16px; margin-bottom: 8px;
transition: border-color .15s;
}
.lav-item.done { border-color: rgba(46,204,113,.3); background: rgba(46,204,113,.04); }
.lav-item.partial { border-color: rgba(245,166,35,.3); background: rgba(245,166,35,.04); }
.lav-item.waiting { border-color: rgba(232,64,64,.3); background: rgba(232,64,64,.04); }

.lav-header { display: flex; justify-content: space-between; align-items: center; }
.lav-title { font-size: 14px; font-weight: 700; }
.lav-meta { font-size: 12px; color: var(–text2); font-family: var(–mono); margin-top: 4px; }
.status-pill {
padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
font-family: var(–mono); letter-spacing: .5px;
}
.pill-open { background: rgba(122,143,166,.15); color: var(–text2); }
.pill-done { background: rgba(46,204,113,.15); color: var(–green); }
.pill-partial { background: rgba(245,166,35,.15); color: var(–accent2); }
.pill-waiting { background: rgba(232,64,64,.15); color: var(–red); }

.lav-details {
margin-top: 12px; padding-top: 12px;
border-top: 1px solid var(–border);
display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
font-size: 13px; font-family: var(–mono);
}
.lav-details .detail-item { color: var(–text2); }
.lav-details .detail-item span { color: var(–text); }
.lav-details.full { grid-template-columns: 1fr; }

/* Link section */
.link-box {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px; padding: 10px 14px;
font-family: var(–mono); font-size: 12px;
color: var(–blue); word-break: break-all;
margin-top: 8px;
}

/* Export panel */
.export-area {
background: var(–bg); border: 1px solid var(–border);
border-radius: 8px; padding: 16px; margin-top: 16px;
font-family: var(–mono); font-size: 12px; line-height: 1.8;
white-space: pre-wrap; color: var(–text2); max-height: 300px; overflow-y: auto;
}

/* ── TECNICO VIEW ── */
.tec-layout {
max-width: 600px; margin: 0 auto; padding: 20px 16px;
}
.tec-header {
text-align: center; padding: 24px 0 20px;
border-bottom: 1px solid var(–border); margin-bottom: 20px;
}
.tec-header .train-big { font-size: 32px; font-weight: 800; font-family: var(–mono); }
.tec-header .tec-sub { font-size: 13px; color: var(–text2); margin-top: 4px; }

.tec-lav {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px; padding: 18px; margin-bottom: 14px;
}
.tec-lav-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.tec-lav-type {
font-size: 11px; font-family: var(–mono); letter-spacing: 1px;
text-transform: uppercase; color: var(–text2); margin-bottom: 14px;
}
.field-label { font-size: 12px; color: var(–text2); font-family: var(–mono); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 12px; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mat-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 6px; }
.mat-list { margin-bottom: 8px; }
.btn-icon { width: 32px; height: 32px; background: var(–surface2); border: 1px solid var(–border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .15s; }
.btn-icon:hover { border-color: var(–red); color: var(–red); }

.esito-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 6px; }
.esito-btn {
padding: 10px; border-radius: 8px; border: 2px solid var(–border);
background: transparent; color: var(–text2); cursor: pointer;
font-family: var(–sans); font-size: 12px; font-weight: 700;
text-align: center; transition: all .15s;
}
.esito-btn.sel-risolto { border-color: var(–green); color: var(–green); background: rgba(46,204,113,.1); }
.esito-btn.sel-parziale { border-color: var(–accent2); color: var(–accent2); background: rgba(245,166,35,.1); }
.esito-btn.sel-attesa { border-color: var(–red); color: var(–red); background: rgba(232,64,64,.1); }

.tec-submit-btn {
width: 100%; padding: 16px; margin-top: 8px;
background: var(–accent); border: none; border-radius: 8px;
color: #fff; font-family: var(–sans); font-size: 15px; font-weight: 800;
cursor: pointer; transition: all .15s;
}
.tec-submit-btn:hover { background: #d03a14; }
.tec-submit-btn:disabled { background: var(–border); cursor: not-allowed; color: var(–text2); }

.done-banner {
background: rgba(46,204,113,.1); border: 1px solid var(–green);
border-radius: 8px; padding: 14px; text-align: center;
color: var(–green); font-weight: 700; font-size: 14px;
margin-bottom: 14px;
}

/* Tecnico login */
.tec-login {
max-width: 380px; margin: 60px auto; padding: 0 16px;
}
.login-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 12px; padding: 28px;
}
.login-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.login-card p { font-size: 13px; color: var(–text2); margin-bottom: 20px; }

/* Toast */
.toast {
position: fixed; bottom: 24px; right: 24px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 8px; padding: 12px 18px;
font-size: 13px; font-family: var(–mono);
opacity: 0; transform: translateY(10px);
transition: all .3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: var(–green); color: var(–green); }
.toast.error { border-color: var(–red); color: var(–red); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

label.field-label-inline { font-size: 13px; color: var(–text2); }

.divider { border: none; border-top: 1px solid var(–border); margin: 16px 0; }

.scan-lav-item {
background: var(–bg);
border: 1px solid var(–accent2);
border-radius: 6px;
padding: 10px 12px;
margin-bottom: 6px;
display: flex;
align-items: flex-start;
gap: 10px;
}
.scan-lav-item input[type=checkbox] { margin-top: 3px; accent-color: var(–accent); width:16px; height:16px; flex-shrink:0; }
.scan-lav-text { flex:1; font-size:13px; }
.scan-lav-title { font-weight:700; margin-bottom:2px; }
.scan-lav-sub { font-size:11px; color:var(–text2); font-family:var(–mono); }
.scan-confirm-btn { width:100%; padding:12px; margin-top:10px; background:var(–accent2); border:none; border-radius:8px; color:#000; font-family:var(–sans); font-size:14px; font-weight:800; cursor:pointer; }
.scan-confirm-btn:hover { background:#e09000; }

@media (max-width: 700px) {
/* Layout principale: colonna singola */
.ct-layout {
grid-template-columns: 1fr;
height: auto;

<script>
// ── JSONBIN STORAGE ───────────────────────────────────────
const BIN_ID  = '69b5ae9cc3097a1dd525b26c';
const API_KEY = '$2a$10$JInhwZP8/xVWklvwoXHVwOErPWfpOJjq02FgGwEKEzKRqDfQHotyG';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
let isSaving = false;
let pendingSave = false;

async function loadData() {
  try {
    const r = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const json = await r.json();
    return json.record || { odls: {} };
  } catch(e) {
    console.error('Load error', e);
    return { odls: {} };
  }
}

async function saveData(data) {
  if (isSaving) { pendingSave = true; return; }
  isSaving = true;
  showSaving(true);
  try {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify(data)
    });
  } catch(e) {
    console.error('Save error', e);
    toast('Errore salvataggio, riprova', 'error');
  } finally {
    isSaving = false;
    showSaving(false);
    if (pendingSave) {
      pendingSave = false;
      saveData(data);
    }
  }
}

function showSaving(on) {
  const el = document.getElementById('saving-indicator');
  if (el) el.style.opacity = on ? '1' : '0';
}

let DB = { odls: {} };
let selectedOdlId = null;
let currentTecnico = null;

// ── UTILS ──────────────────────────────────────────────
function genId() { return 'ODL-' + Math.random().toString(36).substr(2,6).toUpperCase(); }
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2200);
}
function switchMode(mode) {
  document.getElementById('view-capoturno').classList.toggle('active', mode==='capoturno');
  document.getElementById('view-tecnico').classList.toggle('active', mode==='tecnico');
  document.getElementById('btn-ct').classList.toggle('active', mode==='capoturno');
  document.getElementById('btn-tec').classList.toggle('active', mode==='tecnico');
}

// ── CAPOTURNO ──────────────────────────────────────────
async function createOdl() {
  const trainId = document.getElementById('new-train-id').value.trim();
  const turno = document.getElementById('new-turno').value.trim();
  if (!trainId) { toast('Inserisci il numero treno', 'error'); return; }
  const id = genId();
  DB.odls[id] = {
    id, trainId, turno: turno || '—',
    createdAt: new Date().toLocaleString('it-IT'),
    lavorazioni: []
  };
  renderTrainList();
  selectOdl(id);
  document.getElementById('new-train-id').value = '';
  document.getElementById('new-turno').value = '';
  await saveData(DB);
  toast('Ordine creato: ' + id);
}

function renderTrainList() {
  const el = document.getElementById('train-list');
  const odls = Object.values(DB.odls);
  if (!odls.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text2);font-size:13px;font-family:var(--mono);">Nessun ordine ancora.<br>Crea il primo ↑</div>';
    return;
  }
  el.innerHTML = odls.reverse().map(o => {
    const total = o.lavorazioni.length;
    const done = o.lavorazioni.filter(l => l.esito && l.esito !== '').length;
    const pct = total ? Math.round(done/total*100) : 0;
    return `<div class="train-card ${selectedOdlId===o.id?'selected':''}" onclick="selectOdl('${o.id}')">
      <div class="train-card-header">
        <div class="train-id">${o.trainId}</div>

      <div class="progress-bar"><div class="progress-fill ${pct===100?'complete':''}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderLavItem(l, i) {

  const pillCls = l.esito==='Risolto' ? 'pill-done' : l.esito==='Parziale' ? 'pill-partial' : l.esito==='In attesa ricambio' ? 'pill-waiting' : 'pill-open';
  const pillLabel = l.esito || 'Aperta';
  const mats = l.materiali && l.materiali.length ? l.materiali.map(m=>`${m.codice} | ${m.desc} | IN:${m.qin} OUT:${m.qout}`).join(', ') : '—';

async function addLavorazione() {

  DB.odls[selectedOdlId].lavorazioni.push({

  });

function copyCode(code) {
  const msg = `Codice ordine di lavoro: ${code}\nApri l'app HMU Service → Vista Tecnico → inserisci questo codice`;

async function deleteOdl(id) {

  txt += `═══════════════════════════════════════\n\n`;
  odl.lavorazioni.forEach((l,i) => {
    txt += `[${i+1}] ${l.tipo.toUpperCase()} — ${l.descrizione}\n`;
    txt += `    Tecnico: ${l.tecnicoNome||l.tecnicoAssegnato||'—'} (${l.matricola||'—'})\n`;

    txt += `    Attività: ${l.attivitaSvolta||'—'}\n`;

function copyExport() {
  const txt = document.getElementById('export-text').textContent;

  const code = document.getElementById('tec-odl-code').value.trim().toUpperCase();
  const name = document.getElementById('tec-name').value.trim();

<button class="tec-submit-btn" onclick="submitLav('${odlId}',${i})">Chiudi lavorazione</button>

  </div>`;

// Salva tutti i campi testo del DOM nel DB prima di ogni re-render
function saveFieldsToDB(odlId) {
const odl = DB.odls[odlId];
odl.lavorazioni.forEach((l, i) => {
if (l.esito) return; // già chiusa, niente da salvare
const tStart = document.getElementById(‘t-start-’+i);
const tEnd   = document.getElementById(‘t-end-’+i);
const attiv  = document.getElementById(‘t-attiv-’+i);
const causa  = document.getElementById(‘t-causa-’+i);
if (tStart) l._tStart = tStart.value;
if (tEnd)   l._tEnd   = tEnd.value;
if (attiv)  l._attiv  = attiv.value;
if (causa)  l._causa  = causa.value;
// materiali: già aggiornati in tempo reale da updateMat
});
}

async function addMat(odlId, lavIdx) {
saveFieldsToDB(odlId);
const l = DB.odls[odlId].lavorazioni[lavIdx];
if (!l._tempMats) l._tempMats = [];
l._tempMats.push({ codice:’’, desc:’’, qin:’’, qout:’’ });
renderTecLayout(DB.odls[odlId]);
await saveData(DB);
}

async function removeMat(odlId, lavIdx, matIdx) {
saveFieldsToDB(odlId);
DB.odls[odlId].lavorazioni[lavIdx]._tempMats.splice(matIdx, 1);
renderTecLayout(DB.odls[odlId]);
await saveData(DB);
}

function updateMat(odlId, lavIdx, matIdx, field, val) {
if (!DB.odls[odlId].lavorazioni[lavIdx]._tempMats) return;
DB.odls[odlId].lavorazioni[lavIdx]._tempMats[matIdx][field] = val;
}

function setEsito(odlId, lavIdx, val) {
saveFieldsToDB(odlId);
const l = DB.odls[odlId].lavorazioni[lavIdx];
l._esito = (l._esito === val) ? ‘’ : val;
renderTecLayout(DB.odls[odlId]);
}

async function submitLav(odlId, lavIdx) {
saveFieldsToDB(odlId);
const l = DB.odls[odlId].lavorazioni[lavIdx];

if (!l._attiv || !l._attiv.trim()) { toast(‘Inserisci la descrizione attività’, ‘error’); return; }
if (!l._esito) { toast(‘Seleziona un esito’, ‘error’); return; }

l.tecnicoNome    = currentTecnico.name;
l.matricola      = currentTecnico.matricola;
l.oraInizio      = l._tStart || ‘’;
l.oraFine        = l._tEnd   || ‘’;
l.attivitaSvolta = l._attiv  || ‘’;
l.causa          = l._causa  || ‘’;
l.materiali      = l._tempMats || [];
l.esito          = l._esito;

delete l._tempMats; delete l._esito;
delete l._tStart;   delete l._tEnd;
delete l._attiv;    delete l._causa;

await saveData(DB);
toast(‘Lavorazione chiusa! ✅’);
renderTecLayout(DB.odls[odlId]);
if (selectedOdlId === odlId) renderMainPanel();
}

// ── SCAN OdL WITH AI ──────────────────────────────────
async function scanOdl(files) {
if (!files || files.length === 0) return;

const statusEl = document.getElementById(‘scan-status’);

// Convert images to base64
const images = [];
for (const file of files) {
const b64 = await new Promise((res, rej) => {
const r = new FileReader();
r.onload = () => res(r.result.split(’,’)[1]);
r.onerror = rej;
r.readAsDataURL(file);
});
images.push({ type: ‘image’, source: { type: ‘base64’, media_type: file.type, data: b64 } });
}

statusEl.textContent = ‘⟳ AI in analisi delle lavorazioni…’;

const prompt = `Sei un assistente tecnico ferroviario. Analizza queste pagine di un Ordine di Lavoro Trenitalia per treni Blues/HMU HTR312/HTR412.

1. “azioni”: le azioni da eseguire descritte nel testo, in modo conciso (max 150 caratteri)
1. “componente”: la sede tecnica o componente (es. “HTR312024-P01”, “DM1”, “DM2”, “SSC”, “SCMT”)

Rispondi SOLO con un array JSON valido, senza markdown, senza backtick, senza testo aggiuntivo. Esempio:
[{“titolo”:“PERDITA PI SSC DM2”,“tipo”:“Correttiva”,“avviso”:“390001476731”,“azioni”:“Controllo captazione SSC, sostituzione ricevitore e antenna”,“componente”:“HTR312024”},{“titolo”:“1000H PWP”,“tipo”:“Preventiva”,“avviso”:””,“azioni”:“Manutenzione programmata 1000 ore PWP”,“componente”:“HTR312024”}]`;

const msgContent = [
…images,
{ type: ‘text’, text: prompt }
];

try {
const response = await fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’ },
body: JSON.stringify({
model: ‘claude-sonnet-4-20250514’,
max_tokens: 2000,
messages: [{ role: ‘user’, content: msgContent }]
})
});

```
const data = await response.json();
const raw = data.content?.[0]?.text || '';

let lavorazioni = [];
try {
  // Clean up any accidental markdown
  const clean = raw.replace(/```json|```/g, '').trim();
  lavorazioni = JSON.parse(clean);
} catch(e) {
  statusEl.textContent = '❌ Errore parsing risposta AI. Riprova.';
  statusEl.style.color = 'var(--red)';
  console.error('Parse error:', raw);
  return;
}

if (!lavorazioni.length) {

  return;
}

statusEl.textContent = `✓ Trovate ${lavorazioni.length} lavorazioni — seleziona quelle da importare:`;
statusEl.style.color = 'var(--green)';

// Show preview with checkboxes
previewEl.style.display = 'block';
previewEl.innerHTML = `
  <div style="margin-bottom:8px;font-size:12px;color:var(--text2);font-family:var(--mono)">
    Deseleziona eventuali lavorazioni da non importare:
  </div>
  ${lavorazioni.map((l, i) => `
    <div class="scan-lav-item">
      <input type="checkbox" id="scan-cb-${i}" checked>
      <div class="scan-lav-text">
        <div class="scan-lav-title">${l.titolo}</div>

  `).join('')}
  <button class="scan-confirm-btn" onclick="confirmScanImport(${JSON.stringify(lavorazioni).replace(/"/g,'&quot;')})">
    ✅ Importa lavorazioni selezionate
  </button>
`;
```

} catch(e) {
statusEl.textContent = ’❌ Errore chiamata AI: ’ + e.message;
statusEl.style.color = ‘var(–red)’;
console.error(e);
}

// Reset file input

}

async function confirmScanImport(lavorazioni) {
const checkboxes = document.querySelectorAll(’[id^=“scan-cb-”]’);
let importedCount = 0;

checkboxes.forEach((cb, i) => {
if (cb.checked && lavorazioni[i]) {
const l = lavorazioni[i];
const desc = l.avviso ? `[${l.avviso}] ${l.titolo}` : l.titolo;
DB.odls[selectedOdlId].lavorazioni.push({
id: Date.now() + i,
descrizione: desc,
tipo: l.tipo || ‘Correttiva’,
tecnicoAssegnato: ‘’,
notaAI: l.azioni || ‘’,
componente: l.componente || ‘’,
esito: ‘’
});
importedCount++;
}
});

document.getElementById(‘scan-status’).style.display = ‘none’;
document.getElementById(‘scan-preview’).style.display = ‘none’;
document.getElementById(‘scan-status’).style.color = ‘var(–accent2)’;

await saveData(DB);
renderMainPanel();
toast(`✅ Importate ${importedCount} lavorazioni!`);
}

// ── URL PARAM per link diretto ─────────────────────────
function checkUrlParam() {
const params = new URLSearchParams(window.location.search);
const odlId = params.get(‘odl’);
if (odlId && DB.odls[odlId]) {
switchMode(‘tecnico’);
document.getElementById(‘tec-odl-code’).value = odlId;
}
}

// ── INIT ───────────────────────────────────────────────
(async () => {
toast(‘Caricamento dati…’, ‘success’);
DB = await loadData();
renderTrainList();
checkUrlParam();
toast(‘Dati caricati ✓’);
})();
</script>
