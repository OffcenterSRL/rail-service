  .header-right { display: flex; gap: 8px; align-items: center; }
  .mode-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-family: var(--mono); cursor: pointer;
    transition: all .2s;
  }
  .mode-badge:hover { border-color: var(--accent); color: var(--accent); }
  .mode-badge.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── CAPOTURNO VIEW ── */
  .ct-layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 60px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h2 {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text2); margin-bottom: 14px;
  }
  .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  input[type=text], input[type=number], textarea, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 6px;
    outline: none;
    width: 100%;
    transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  select option { background: var(--surface); }

  .btn {
    padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #d03a14; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover { background: #2369b8; }
  .btn-green { background: var(--green); color: #000; }

  /* Train list */
  .train-list { flex: 1; overflow-y: auto; padding: 12px; }
  .train-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .train-card:hover, .train-card.selected { border-color: var(--accent); }
  .train-card.selected { background: rgba(232,68,26,.08); }
  .train-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .train-id { font-size: 16px; font-weight: 800; font-family: var(--mono); }
  .train-progress { font-size: 12px; color: var(--text2); font-family: var(--mono); }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; border-radius: 2px; }
  .progress-fill.complete { background: var(--green); }

  /* Main panel */
  .main-panel { overflow-y: auto; padding: 24px; }
  .panel-empty {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text2); gap: 12px;
  }
  .panel-empty .big-icon { font-size: 48px; opacity: .3; }
  .panel-empty p { font-family: var(--mono); font-size: 13px; }

  .panel-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title { font-size: 24px; font-weight: 800; }
  .panel-meta { font-size: 13px; color: var(--text2); font-family: var(--mono); margin-top: 4px; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
  }
  .stat-label { font-size: 11px; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 800; }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent2); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }

  /* Add lavorazione form */
  .add-lav-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 20px;
  }
  .add-lav-form h3 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; font-family: var(--mono); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }

  /* Lavorazioni table */
  .lav-section h3 {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text2); margin-bottom: 12px; font-family: var(--mono);
  }
  .lav-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 8px;
    transition: border-color .15s;
  }
  .lav-item.done { border-color: rgba(46,204,113,.3); background: rgba(46,204,113,.04); }
  .lav-item.partial { border-color: rgba(245,166,35,.3); background: rgba(245,166,35,.04); }
  .lav-item.waiting { border-color: rgba(232,64,64,.3); background: rgba(232,64,64,.04); }

  .lav-header { display: flex; justify-content: space-between; align-items: center; }
  .lav-title { font-size: 14px; font-weight: 700; }
  .lav-meta { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-top: 4px; }
  .status-pill {
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
    font-family: var(--mono); letter-spacing: .5px;
  }
  .pill-open { background: rgba(122,143,166,.15); color: var(--text2); }
  .pill-done { background: rgba(46,204,113,.15); color: var(--green); }
  .pill-partial { background: rgba(245,166,35,.15); color: var(--accent2); }
  .pill-waiting { background: rgba(232,64,64,.15); color: var(--red); }

  .lav-details {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    font-size: 13px; font-family: var(--mono);
  }
  .lav-details .detail-item { color: var(--text2); }
  .lav-details .detail-item span { color: var(--text); }
  .lav-details.full { grid-template-columns: 1fr; }

  /* Link section */
  .link-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--blue); word-break: break-all;
    margin-top: 8px;
  }

  /* Export panel */
  .export-area {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-top: 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.8;
    white-space: pre-wrap; color: var(--text2); max-height: 300px; overflow-y: auto;

  /* ── TECNICO VIEW ── */
  .tec-layout {
    max-width: 600px; margin: 0 auto; padding: 20px 16px;
  }
  .tec-header {
    text-align: center; padding: 24px 0 20px;
    border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  .tec-header .train-big { font-size: 32px; font-weight: 800; font-family: var(--mono); }
  .tec-header .tec-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .tec-lav {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; margin-bottom: 14px;
  }
  .tec-lav-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .tec-lav-type {
    font-size: 11px; font-family: var(--mono); letter-spacing: 1px;
    text-transform: uppercase; color: var(--text2); margin-bottom: 14px;
  }
  .field-label { font-size: 12px; color: var(--text2); font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 12px; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mat-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 6px; }
  .mat-list { margin-bottom: 8px; }
  .btn-icon { width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .15s; }
  .btn-icon:hover { border-color: var(--red); color: var(--red); }

  .esito-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 6px; }
  .esito-btn {
    padding: 10px; border-radius: 8px; border: 2px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    text-align: center; transition: all .15s;
  }
  .esito-btn.sel-risolto { border-color: var(--green); color: var(--green); background: rgba(46,204,113,.1); }
  .esito-btn.sel-parziale { border-color: var(--accent2); color: var(--accent2); background: rgba(245,166,35,.1); }
  .esito-btn.sel-attesa { border-color: var(--red); color: var(--red); background: rgba(232,64,64,.1); }

  .tec-submit-btn {
    width: 100%; padding: 16px; margin-top: 8px;
    background: var(--accent); border: none; border-radius: 8px;
    color: #fff; font-family: var(--sans); font-size: 15px; font-weight: 800;
    cursor: pointer; transition: all .15s;
  }
  .tec-submit-btn:hover { background: #d03a14; }
  .tec-submit-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--text2); }

  .done-banner {
    background: rgba(46,204,113,.1); border: 1px solid var(--green);
    border-radius: 8px; padding: 14px; text-align: center;
    color: var(--green); font-weight: 700; font-size: 14px;
    margin-bottom: 14px;
  }

  /* Tecnico login */
  .tec-login {
    max-width: 380px; margin: 60px auto; padding: 0 16px;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px;
  }
  .login-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .login-card p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 18px;
    font-size: 13px; font-family: var(--mono);
    opacity: 0; transform: translateY(10px);
    transition: all .3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  label.field-label-inline { font-size: 13px; color: var(--text2); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  @media (max-width: 700px) {
    .ct-layout { grid-template-columns: 1fr; }
    .sidebar { height: auto; max-height: 40vh; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr 1fr; }
  }

&lt;script&gt;
// ── STORAGE ──────────────────────────────────────────────
const STORAGE_KEY = 'hmu_service_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { odls: {} };
  } catch { return { odls: {} }; }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.error('Save error', e); }
}

let DB = { odls: {} };
let selectedOdlId = null;
let currentTecnico = null;

// ── UTILS ──────────────────────────────────────────────
function genId() { return 'ODL-' + Math.random().toString(36).substr(2,6).toUpperCase(); }
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() =&gt; el.className = 'toast', 2200);
}
function switchMode(mode) {
  document.getElementById('view-capoturno').classList.toggle('active', mode==='capoturno');
  document.getElementById('view-tecnico').classList.toggle('active', mode==='tecnico');
  document.getElementById('btn-ct').classList.toggle('active', mode==='capoturno');
  document.getElementById('btn-tec').classList.toggle('active', mode==='tecnico');
}

// ── CAPOTURNO ──────────────────────────────────────────
function createOdl() {
  const trainId = document.getElementById('new-train-id').value.trim();
  const turno = document.getElementById('new-turno').value.trim();
  if (!trainId) { toast('Inserisci il numero treno', 'error'); return; }
  const id = genId();
  DB.odls[id] = {
    id, trainId, turno: turno || '—',
    createdAt: new Date().toLocaleString('it-IT'),
    lavorazioni: []
  };
  saveData(DB);
  renderTrainList();
  selectOdl(id);
  document.getElementById('new-train-id').value = '';
  document.getElementById('new-turno').value = '';
  toast('Ordine creato: ' + id);
}

function renderTrainList() {
  const el = document.getElementById('train-list');
  const odls = Object.values(DB.odls);
  if (!odls.length) {
    el.innerHTML = '&lt;div style=&quot;text-align:center;padding:30px;color:var(--text2);font-size:13px;font-family:var(--mono);&quot;&gt;Nessun ordine ancora.&lt;br&gt;Crea il primo ↑&lt;/div&gt;';
    return;
  }
  el.innerHTML = odls.reverse().map(o =&gt; {
    const total = o.lavorazioni.length;
    const done = o.lavorazioni.filter(l =&gt; l.esito &amp;&amp; l.esito !== '').length;
    const pct = total ? Math.round(done/total*100) : 0;
    return `&lt;div class=&quot;train-card ${selectedOdlId===o.id?'selected':''}&quot; onclick=&quot;selectOdl('${o.id}')&quot;&gt;
      &lt;div class=&quot;train-card-header&quot;&gt;
        &lt;div class=&quot;train-id&quot;&gt;${o.trainId}&lt;/div&gt;
        &lt;div class=&quot;train-progress&quot;&gt;${done}/${total}&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;font-size:12px;color:var(--text2);font-family:var(--mono);margin-bottom:8px&quot;&gt;${o.id} · ${o.turno}&lt;/div&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;&lt;div class=&quot;progress-fill ${pct===100?'complete':''}&quot; style=&quot;width:${pct}%&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;`;
  }).join('');
}

function selectOdl(id) {
  selectedOdlId = id;
  renderTrainList();
  renderMainPanel();
}

function renderMainPanel() {
  const panel = document.getElementById('main-panel');
  if (!selectedOdlId || !DB.odls[selectedOdlId]) {
    panel.innerHTML = '&lt;div class=&quot;panel-empty&quot;&gt;&lt;div class=&quot;big-icon&quot;&gt;🚆&lt;/div&gt;&lt;p&gt;Seleziona un treno dalla lista&lt;/p&gt;&lt;/div&gt;';
    return;
  }
  const odl = DB.odls[selectedOdlId];
  const total = odl.lavorazioni.length;
  const done = odl.lavorazioni.filter(l=&gt;l.esito==='Risolto').length;
  const partial = odl.lavorazioni.filter(l=&gt;l.esito==='Parziale').length;
  const waiting = odl.lavorazioni.filter(l=&gt;l.esito==='In attesa ricambio').length;
  const open = odl.lavorazioni.filter(l=&gt;!l.esito||l.esito==='').length;
  const baseUrl = window.location.href.split('?')[0];
  const link = baseUrl + '?odl=' + odl.id;

  panel.innerHTML = `
    &lt;div class=&quot;panel-header&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;panel-title&quot;&gt;Treno ${odl.trainId}&lt;/div&gt;
        &lt;div class=&quot;panel-meta&quot;&gt;${odl.id} · Turno: ${odl.turno} · ${odl.createdAt}&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:8px;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn btn-secondary btn-sm&quot; onclick=&quot;copyCode('${odl.id}')&quot;&gt;📋 Copia codice tecnico&lt;/button&gt;
        &lt;button class=&quot;btn btn-blue btn-sm&quot; onclick=&quot;showExport()&quot;&gt;📤 Export turno&lt;/button&gt;
        &lt;button class=&quot;btn btn-secondary btn-sm&quot; style=&quot;color:var(--red)&quot; onclick=&quot;deleteOdl('${odl.id}')&quot;&gt;🗑&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;stats-row&quot;&gt;
      &lt;div class=&quot;stat-card&quot;&gt;&lt;div class=&quot;stat-label&quot;&gt;Totale&lt;/div&gt;&lt;div class=&quot;stat-value blue&quot;&gt;${total}&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;stat-card&quot;&gt;&lt;div class=&quot;stat-label&quot;&gt;Risolte&lt;/div&gt;&lt;div class=&quot;stat-value green&quot;&gt;${done}&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;stat-card&quot;&gt;&lt;div class=&quot;stat-label&quot;&gt;Parziali&lt;/div&gt;&lt;div class=&quot;stat-value orange&quot;&gt;${partial}&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;stat-card&quot;&gt;&lt;div class=&quot;stat-label&quot;&gt;In attesa&lt;/div&gt;&lt;div class=&quot;stat-value red&quot;&gt;${waiting}&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;link-box&quot;&gt;🔑 Codice per il tecnico: &lt;strong style=&quot;color:var(--text);font-size:15px&quot;&gt;${odl.id}&lt;/strong&gt; &amp;nbsp;&lt;span style=&quot;color:var(--text2);font-size:11px&quot;&gt;→ il tecnico lo inserisce nella vista Tecnico&lt;/span&gt;&lt;/div&gt;

    &lt;hr class=&quot;divider&quot;&gt;

    &lt;div class=&quot;add-lav-form&quot;&gt;
      &lt;h3&gt;+ Nuova Lavorazione&lt;/h3&gt;
      &lt;div class=&quot;form-grid&quot;&gt;
        &lt;input type=&quot;text&quot; id=&quot;lav-desc&quot; placeholder=&quot;Descrizione attività&quot;&gt;
        &lt;select id=&quot;lav-tipo&quot;&gt;
          &lt;option value=&quot;Preventiva&quot;&gt;Preventiva&lt;/option&gt;
          &lt;option value=&quot;Correttiva&quot;&gt;Correttiva&lt;/option&gt;
        &lt;/select&gt;
        &lt;input type=&quot;text&quot; id=&quot;lav-tecnico&quot; placeholder=&quot;Tecnico assegnato&quot;&gt;
        &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;addLavorazione()&quot;&gt;Aggiungi&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;lav-section&quot;&gt;
      &lt;h3&gt;Lavorazioni (${total})&lt;/h3&gt;
      ${total === 0 ? '&lt;div style=&quot;color:var(--text2);font-size:13px;font-family:var(--mono);padding:16px 0&quot;&gt;Nessuna lavorazione aggiunta ancora.&lt;/div&gt;' : ''}
      ${odl.lavorazioni.map((l,i) =&gt; renderLavItem(l,i)).join('')}
    &lt;/div&gt;

    &lt;div id=&quot;export-section&quot;&gt;&lt;/div&gt;
  `;
}

function renderLavItem(l, i) {
  const cls = l.esito==='Risolto' ? 'done' : l.esito==='Parziale' ? 'partial' : l.esito==='In attesa ricambio' ? 'waiting' : '';
  const pillCls = l.esito==='Risolto' ? 'pill-done' : l.esito==='Parziale' ? 'pill-partial' : l.esito==='In attesa ricambio' ? 'pill-waiting' : 'pill-open';
  const pillLabel = l.esito || 'Aperta';
  const mats = l.materiali &amp;&amp; l.materiali.length ? l.materiali.map(m=&gt;`${m.codice} | ${m.desc} | IN:${m.qin} OUT:${m.qout}`).join(', ') : '—';
  return `&lt;div class=&quot;lav-item ${cls}&quot;&gt;
    &lt;div class=&quot;lav-header&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;lav-title&quot;&gt;${l.descrizione}&lt;/div&gt;
        &lt;div class=&quot;lav-meta&quot;&gt;${l.tipo} · ${l.tecnicoAssegnato ? 'Assegnata a: '+l.tecnicoAssegnato : 'Non assegnata'}&lt;/div&gt;
      &lt;/div&gt;
      &lt;span class=&quot;status-pill ${pillCls}&quot;&gt;${pillLabel}&lt;/span&gt;
    &lt;/div&gt;
    ${l.esito ? `&lt;div class=&quot;lav-details&quot;&gt;
      &lt;div class=&quot;detail-item&quot;&gt;Tecnico: &lt;span&gt;${l.tecnicoNome || '—'} (${l.matricola || '—'})&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;detail-item&quot;&gt;Ore: &lt;span&gt;${l.oraInizio || '—'} → ${l.oraFine || '—'}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;detail-item&quot;&gt;Attività svolta: &lt;span&gt;${l.attivitaSvolta || '—'}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;detail-item&quot;&gt;Causa: &lt;span&gt;${l.causa || '—'}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;detail-item&quot; style=&quot;grid-column:1/-1&quot;&gt;Materiali: &lt;span&gt;${mats}&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;` : ''}
  &lt;/div&gt;`;
}

function addLavorazione() {
  const desc = document.getElementById('lav-desc').value.trim();
  const tipo = document.getElementById('lav-tipo').value;
  const tec = document.getElementById('lav-tecnico').value.trim();
  if (!desc) { toast('Inserisci la descrizione', 'error'); return; }
  DB.odls[selectedOdlId].lavorazioni.push({
    id: Date.now(), descrizione: desc, tipo, tecnicoAssegnato: tec, esito: ''
  });
  saveData(DB);
  renderMainPanel();
  toast('Lavorazione aggiunta');
}

function copyCode(code) {
  const msg = `Codice ordine di lavoro: ${code}\nApri l'app HMU Service → Vista Tecnico → inserisci questo codice`;
  navigator.clipboard.writeText(msg).then(()=&gt;toast('Codice copiato! Incollalo su WhatsApp')).catch(()=&gt;toast('Codice: '+code,'error'));
}

function deleteOdl(id) {
  if (!confirm('Eliminare questo ordine?')) return;
  delete DB.odls[id];
  selectedOdlId = null;
  saveData(DB);
  renderTrainList();
  renderMainPanel();
  toast('Ordine eliminato');
}

function showExport() {
  const odl = DB.odls[selectedOdlId];
  if (!odl) return;
  let txt = `═══════════════════════════════════════\n`;
  txt += `RIEPILOGO TURNO — ${odl.turno}\n`;
  txt += `Treno: ${odl.trainId}  |  OdL: ${odl.id}\n`;
  txt += `Data: ${odl.createdAt}\n`;
  txt += `═══════════════════════════════════════\n\n`;
  odl.lavorazioni.forEach((l,i) =&gt; {
    txt += `[${i+1}] ${l.tipo.toUpperCase()} — ${l.descrizione}\n`;
    txt += `    Tecnico: ${l.tecnicoNome||l.tecnicoAssegnato||'—'} (${l.matricola||'—'})\n`;
    txt += `    Ore: ${l.oraInizio||'—'} → ${l.oraFine||'—'}\n`;
    txt += `    Attività: ${l.attivitaSvolta||'—'}\n`;
    txt += `    Causa: ${l.causa||'—'}\n`;
    if (l.materiali &amp;&amp; l.materiali.length) {
      txt += `    Materiali:\n`;
      l.materiali.forEach(m =&gt; txt += `      - ${m.codice} | ${m.desc} | IN:${m.qin} OUT:${m.qout}\n`);
    }
    txt += `    Esito: ${l.esito||'APERTA'}\n\n`;
  });
  txt += `Lavorazioni totali: ${odl.lavorazioni.length}\n`;
  txt += `Risolte: ${odl.lavorazioni.filter(l=&gt;l.esito==='Risolto').length}  |  `;
  txt += `Parziali: ${odl.lavorazioni.filter(l=&gt;l.esito==='Parziale').length}  |  `;
  txt += `In attesa: ${odl.lavorazioni.filter(l=&gt;l.esito==='In attesa ricambio').length}\n`;

  const sec = document.getElementById('export-section');
  sec.innerHTML = `
    &lt;hr class=&quot;divider&quot;&gt;
    &lt;div style=&quot;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px&quot;&gt;
      &lt;div style=&quot;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);font-family:var(--mono)&quot;&gt;Export Mail Passaggio Turno&lt;/div&gt;
      &lt;button class=&quot;btn btn-green btn-sm&quot; onclick=&quot;copyExport()&quot;&gt;📋 Copia testo&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class=&quot;export-area&quot; id=&quot;export-text&quot;&gt;${txt}&lt;/div&gt;
  `;
  sec.scrollIntoView({ behavior: 'smooth' });
}

function copyExport() {
  const txt = document.getElementById('export-text').textContent;
  navigator.clipboard.writeText(txt).then(()=&gt;toast('Testo copiato per la mail!')).catch(()=&gt;toast('Errore copia','error'));
}

// ── TECNICO ────────────────────────────────────────────
function tecLogin() {
  const code = document.getElementById('tec-odl-code').value.trim().toUpperCase();
  const name = document.getElementById('tec-name').value.trim();
  const mat = document.getElementById('tec-matricola').value.trim();
  if (!code || !name || !mat) { toast('Compila tutti i campi', 'error'); return; }
  const odl = DB.odls[code];
  if (!odl) { toast('Codice OdL non trovato', 'error'); return; }
  currentTecnico = { name, matricola: mat };
  document.getElementById('tec-login-area').style.display = 'none';
  document.getElementById('tec-work-area').style.display = 'block';
  renderTecLayout(odl);
}

function renderTecLayout(odl) {
  const container = document.getElementById('tec-lav-container');
  const myLavs = odl.lavorazioni.filter(l =&gt; !l.tecnicoAssegnato || l.tecnicoAssegnato.toLowerCase().includes(currentTecnico.name.split(' ')[0].toLowerCase()) || true);

  container.innerHTML = `
    &lt;div class=&quot;tec-header&quot;&gt;
      &lt;div class=&quot;train-big&quot;&gt;🚆 ${odl.trainId}&lt;/div&gt;
      &lt;div class=&quot;tec-sub&quot;&gt;${odl.id} · ${odl.turno}&lt;/div&gt;
      &lt;div class=&quot;tec-sub&quot; style=&quot;color:var(--accent);margin-top:4px&quot;&gt;Ciao, ${currentTecnico.name} (${currentTecnico.matricola})&lt;/div&gt;
    &lt;/div&gt;
    ${myLavs.map((l,i) =&gt; renderTecLav(l, i, odl.id)).join('')}
  `;
}

function renderTecLav(l, i, odlId) {
  if (l.esito) {
    return `&lt;div class=&quot;done-banner&quot;&gt;✅ Lavorazione &quot;${l.descrizione}&quot; già chiusa: ${l.esito}&lt;/div&gt;`;
  }
  const mats = (l._tempMats || []).map((m,mi) =&gt; `
    &lt;div class=&quot;mat-row&quot;&gt;
      &lt;input type=&quot;text&quot; placeholder=&quot;Codice&quot; value=&quot;${m.codice}&quot; oninput=&quot;updateMat('${odlId}',${i},${mi},'codice',this.value)&quot;&gt;
      &lt;input type=&quot;text&quot; placeholder=&quot;IN&quot; value=&quot;${m.qin}&quot; oninput=&quot;updateMat('${odlId}',${i},${mi},'qin',this.value)&quot;&gt;
      &lt;input type=&quot;text&quot; placeholder=&quot;OUT&quot; value=&quot;${m.qout}&quot; oninput=&quot;updateMat('${odlId}',${i},${mi},'qout',this.value)&quot;&gt;
      &lt;button class=&quot;btn-icon&quot; onclick=&quot;removeMat('${odlId}',${i},${mi})&quot;&gt;✕&lt;/button&gt;
    &lt;/div&gt;
    &lt;input type=&quot;text&quot; placeholder=&quot;Descrizione materiale&quot; value=&quot;${m.desc}&quot; oninput=&quot;updateMat('${odlId}',${i},${mi},'desc',this.value)&quot; style=&quot;margin-bottom:6px&quot;&gt;
  `).join('');

  return `&lt;div class=&quot;tec-lav&quot; id=&quot;teclav-${odlId}-${i}&quot;&gt;
    &lt;div class=&quot;tec-lav-title&quot;&gt;${l.descrizione}&lt;/div&gt;
    &lt;div class=&quot;tec-lav-type&quot;&gt;${l.tipo}&lt;/div&gt;

    &lt;div class=&quot;field-label&quot;&gt;Ora inizio / fine&lt;/div&gt;
    &lt;div class=&quot;time-row&quot;&gt;
      &lt;input type=&quot;text&quot; placeholder=&quot;es. 08:30&quot; id=&quot;t-start-${i}&quot; value=&quot;${l._tStart||''}&quot;&gt;
      &lt;input type=&quot;text&quot; placeholder=&quot;es. 10:15&quot; id=&quot;t-end-${i}&quot; value=&quot;${l._tEnd||''}&quot;&gt;
    &lt;/div&gt;

    &lt;div class=&quot;field-label&quot;&gt;Attività svolta&lt;/div&gt;
    &lt;textarea placeholder=&quot;Descrivi cosa hai fatto...&quot; id=&quot;t-attiv-${i}&quot; rows=&quot;3&quot;&gt;${l._attiv||''}&lt;/textarea&gt;

    &lt;div class=&quot;field-label&quot;&gt;Causa identificata&lt;/div&gt;
    &lt;input type=&quot;text&quot; placeholder=&quot;es. Connettore ossidato&quot; id=&quot;t-causa-${i}&quot; value=&quot;${l._causa||''}&quot;&gt;

    &lt;div class=&quot;field-label&quot;&gt;Materiali utilizzati&lt;/div&gt;
    &lt;div class=&quot;mat-list&quot; id=&quot;mat-list-${odlId}-${i}&quot;&gt;${mats}&lt;/div&gt;
    &lt;button class=&quot;btn btn-secondary btn-sm&quot; onclick=&quot;addMat('${odlId}',${i})&quot;&gt;+ Aggiungi materiale&lt;/button&gt;

    &lt;div class=&quot;field-label&quot;&gt;Esito&lt;/div&gt;
    &lt;div class=&quot;esito-grid&quot;&gt;
      &lt;button class=&quot;esito-btn ${l._esito==='Risolto'?'sel-risolto':''}&quot; onclick=&quot;setEsito('${odlId}',${i},'Risolto')&quot;&gt;✅ Risolto&lt;/button&gt;
      &lt;button class=&quot;esito-btn ${l._esito==='Parziale'?'sel-parziale':''}&quot; onclick=&quot;setEsito('${odlId}',${i},'Parziale')&quot;&gt;⚠️ Parziale&lt;/button&gt;
      &lt;button class=&quot;esito-btn ${l._esito==='In attesa ricambio'?'sel-attesa':''}&quot; onclick=&quot;setEsito('${odlId}',${i},'In attesa ricambio')&quot;&gt;🔴 Attesa&lt;/button&gt;
    &lt;/div&gt;

    &lt;button class=&quot;tec-submit-btn&quot; onclick=&quot;submitLav('${odlId}',${i})&quot;&gt;Chiudi lavorazione&lt;/button&gt;
  &lt;/div&gt;`;
}

function addMat(odlId, lavIdx) {
  const l = DB.odls[odlId].lavorazioni[lavIdx];
  if (!l._tempMats) l._tempMats = [];
  l._tempMats.push({ codice:'', desc:'', qin:'', qout:'' });
  saveData(DB);
  renderTecLayout(DB.odls[odlId]);
}

function removeMat(odlId, lavIdx, matIdx) {
  DB.odls[odlId].lavorazioni[lavIdx]._tempMats.splice(matIdx, 1);
  saveData(DB);
  renderTecLayout(DB.odls[odlId]);
}

function updateMat(odlId, lavIdx, matIdx, field, val) {
  DB.odls[odlId].lavorazioni[lavIdx]._tempMats[matIdx][field] = val;
}

function setEsito(odlId, lavIdx, val) {
  DB.odls[odlId].lavorazioni[lavIdx]._esito = val;
  renderTecLayout(DB.odls[odlId]);
}

function submitLav(odlId, lavIdx) {
  const l = DB.odls[odlId].lavorazioni[lavIdx];
  const tStart = document.getElementById('t-start-'+lavIdx)?.value.trim();
  const tEnd = document.getElementById('t-end-'+lavIdx)?.value.trim();
  const attiv = document.getElementById('t-attiv-'+lavIdx)?.value.trim();
  const causa = document.getElementById('t-causa-'+lavIdx)?.value.trim();

  if (!attiv) { toast('Inserisci la descrizione attività', 'error'); return; }
  if (!l._esito) { toast('Seleziona un esito', 'error'); return; }

  l.tecnicoNome = currentTecnico.name;
  l.matricola = currentTecnico.matricola;
  l.oraInizio = tStart;
  l.oraFine = tEnd;
  l.attivitaSvolta = attiv;
  l.causa = causa;
  l.materiali = l._tempMats || [];
  l.esito = l._esito;

  delete l._tempMats; delete l._esito; delete l._tStart; delete l._tEnd; delete l._attiv; delete l._causa;

  saveData(DB);
  toast('Lavorazione chiusa! ✅');
  renderTecLayout(DB.odls[odlId]);
  if (selectedOdlId === odlId) renderMainPanel();
}

// ── URL PARAM per link diretto ─────────────────────────
function checkUrlParam() {
  const params = new URLSearchParams(window.location.search);
  const odlId = params.get('odl');
  if (odlId &amp;&amp; DB.odls[odlId]) {
    switchMode('tecnico');
    document.getElementById('tec-odl-code').value = odlId;
  }
}

// ── INIT ───────────────────────────────────────────────
DB = loadData();
renderTrainList();
checkUrlParam();
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe></div></div></body></html>
